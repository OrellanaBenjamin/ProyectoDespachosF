apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ventas
  labels:
    app: backend-ventas

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend-ventas

  template:
    metadata:
      labels:
        app: backend-ventas

    spec:
      containers:
      - name: backend-ventas
        image: 889217351448.dkr.ecr.us-east-1.amazonaws.com/despachos-back-ventas:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        envFrom:
          - secretRef:
            name: mysql-secret

        env:
          - name: DB_NAME
            value: "ventas"