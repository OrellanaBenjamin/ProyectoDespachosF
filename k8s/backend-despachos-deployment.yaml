apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despachos
  labels:
    app: backend-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-despachos
  template:
    metadata:
      labels:
        app: backend-despachos
    spec:
      containers:
      - name: backend-despachos
        image: 533267065887.dkr.ecr.us-east-1.amazonaws.com/backend-despachos:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://<tu-bd-mysql>:3306/despachos"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"