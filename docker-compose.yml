version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ventas
    ports:
      - "3306:3306"

  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: backend-ventas
    ports:
      - "8081:8080"
    depends_on:
      - mysql

  backend-despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: backend-despachos
    ports:
      - "8082:8080"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./front_despacho
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      - backend-ventas
      - backend-despachos